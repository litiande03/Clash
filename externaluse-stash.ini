[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

;设置规则标志位
ruleset=国外流量,clash-classic:https://raw.githubusercontent.com/litiande03/Clash/refs/heads/master/rules/ip138.list
ruleset=myTV SUPER,clash-classic:https://raw.githubusercontent.com/litiande03/Clash/refs/heads/master/rules/pixman.list
ruleset=myTV SUPER,clash-classic:https://raw.githubusercontent.com/litiande03/Clash/refs/heads/master/rules/pixman-ntp.list
ruleset=奥视澳门,clash-classic:https://raw.githubusercontent.com/litiande03/Clash/refs/heads/master/rules/tmd.list
ruleset=4gtv,clash-classic:https://raw.githubusercontent.com/litiande03/Clash/refs/heads/master/rules/4gtv.list
ruleset=内网穿透,https://raw.githubusercontent.com/litiande03/Clash/refs/heads/master/rules/IntranetIP.list
;阿里云IP段
ruleset=国内流量,https://raw.githubusercontent.com/litiande03/Clash/refs/heads/master/rules/ChinaCompanyIp.list
;国内IP段
;ruleset=国内流量,https://raw.githubusercontent.com/litiande03/Clash/refs/heads/master/rules/ChinaIp.list
ruleset=国内流量,[]GEOIP,CN
ruleset=YouTube,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/YouTube/YouTube.list
ruleset=Telegram,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Telegram/Telegram.list
